<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Mall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #FAFAF9; color: #0C0A09; overflow-x: hidden; }
    .hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1C1917 0%, #292524 50%, #1C1917 100%); overflow: hidden; }
    .hero::before, .hero::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: float 8s ease-in-out infinite; }
    .hero::before { width: 600px; height: 600px; background: linear-gradient(135deg, #CA8A04, #92400E); top: -200px; right: -100px; }
    .hero::after { width: 500px; height: 500px; background: linear-gradient(135deg, #44403C, #78716C); bottom: -150px; left: -100px; animation-delay: -4s; }
    @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.05); } }
    .hero-content { position: relative; z-index: 10; text-align: center; max-width: 900px; padding: 0 24px; }
    .hero-tag { display: inline-block; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: #CA8A04; margin-bottom: 32px; padding: 8px 24px; border: 1px solid rgba(202, 138, 4, 0.4); backdrop-filter: blur(10px); }
    .hero-title { font-family: 'Cormorant', serif; font-size: clamp(48px, 10vw, 96px); font-weight: 400; line-height: 1.1; color: #FAFAF9; margin-bottom: 24px; letter-spacing: -1px; }
    .hero-title span { display: block; font-style: italic; color: #CA8A04; }
    .hero-subtitle { font-family: 'Montserrat', sans-serif; font-size: clamp(14px, 2vw, 18px); font-weight: 300; color: #A8A29E; margin-bottom: 48px; line-height: 1.8; max-width: 600px; margin-left: auto; margin-right: auto; }
    .hero-cta { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .btn { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; padding: 18px 48px; border-radius: 2px; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn-primary { background: #CA8A04; color: #0C0A09; border: none; }
    .btn-primary:hover { background: #EAB308; transform: translateY(-2px); box-shadow: 0 20px 40px rgba(202, 138, 4, 0.3); }
    .btn-secondary { background: transparent; color: #FAFAF9; border: 1px solid rgba(250, 250, 249, 0.3); backdrop-filter: blur(10px); }
    .btn-secondary:hover { background: rgba(250, 250, 249, 0.1); border-color: rgba(250, 250, 249, 0.6); transform: translateY(-2px); }
    .scroll-indicator { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; color: #78716C; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    .scroll-line { width: 1px; height: 60px; background: linear-gradient(to bottom, #CA8A04, transparent); animation: scrollPulse 2s ease-in-out infinite; }
    @keyframes scrollPulse { 0%, 100% { opacity: 0.3; transform: scaleY(0.8); } 50% { opacity: 1; transform: scaleY(1); } }
    @media (max-width: 768px) { .hero-cta { flex-direction: column; align-items: center; } .btn { width: 100%; max-width: 300px; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body>
<section class="hero">
  <div class="hero-content">
    <span class="hero-tag">2026 春夏系列</span>
    <h1 class="hero-title">奢雅生活<span>始于此刻</span></h1>
    <p class="hero-subtitle">甄选全球顶级品牌，汇聚时装、配饰、腕表与珠宝<br>为您呈现非凡的购物体验</p>
    <div class="hero-cta">
      <a href="#" class="btn btn-primary">探索系列</a>
      <a href="#" class="btn btn-secondary">预约专属顾问</a>
    </div>
  </div>
  <div class="scroll-indicator">
    <span>向下探索</span>
    <div class="scroll-line"></div>
  </div>
</section>
</body>
</html>
